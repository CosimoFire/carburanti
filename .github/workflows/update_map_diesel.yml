name: Aggiorna mappa gasolio

on:
  schedule:
    - cron: "5 6 * * *"

  workflow_dispatch:

jobs:
  update-map-gasolio:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Configura Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Installa dipendenze
        run: pip install -r requirements.txt

      - name: Esegui script gasolio
        env:
          DW_API_KEY:   ${{ secrets.DW_API_KEY }}
          DW_CHART_ID:  ${{ secrets.DW_CHART_ID_DIESEL }}
          FUEL_ID:      "2"
          SELF_SERVICE: "1"
        run: python scripts/update_map.py
